name: Generate Snake

"on":
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            outputs: dist/github-snake-dark.svg?palette=github-dark&color_snake=%23ff0000&color_dots[0]=%23ffb3b3&color_dots[1]=%23ff6666&color_dots[2]=%23cc0000&color_dots[3]=%23800000&color_dots[4]=%23590000
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
